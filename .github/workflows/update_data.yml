name: Daily Data Update
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update_data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests PyMuPDF Pillow beautifulsoup4 lxml
      - run: python scripts/fetch_publications.py
        env:
          ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}
      - run: python scripts/update_cv_tex.py
      - run: python scripts/extract_figures.py
      - run: python scripts/fetch_nasa_image.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes"; else git commit -m "chore: daily data update [$(date -u +%Y-%m-%d)]" && git push; fi
